name: Release Verification

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

concurrency:
  group: release-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-32-characters-minimum
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_ANON_KEY: ci-supabase-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key
      OPENAI_API_KEY: ci-openai-key
      PERPLEXITY_API_KEY: ci-perplexity-key
      PERPLEXITY_SONAR_API_KEY: ci-perplexity-sonar-key
      ANTHROPIC_API_KEY: ci-anthropic-key
      GEMINI_API_KEY: ci-gemini-key
      SEMRUSH_API_KEY: ci-semrush-key
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_placeholder
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      STRIPE_PRICE_ID_PRO: price_ci_pro
      STRIPE_PRICE_ID_BUSINESS: price_ci_business
      STRIPE_PRICE_ID_ENTERPRISE: price_ci_enterprise
      RESEND_API_KEY: re_ci_placeholder
      RESEND_FROM_EMAIL: AgenticRev <onboarding@resend.dev>
      CRON_SECRET: ci-cron-secret
      AGENT_MODEL: gpt-5.4-mini
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release package
        run: npm run verify:release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ github.sha }}
          path: |
            .next/BUILD_ID
            .next/build-manifest.json
            .next/routes-manifest.json
            .next/server/app-paths-manifest.json
            .next/server/server-reference-manifest.json
          if-no-files-found: error
